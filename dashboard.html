<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Klaud.id</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #EDECF5; --surface: #F5F4FB; --surface-2: #FFFFFF;
      --navy: #13163A; --blue: #4A72D6; --blue-pale: #D4DEFA;
      --green: #1D9E75; --gold: #EF9F27;
      --muted: #6B7080; --border: rgba(74,114,214,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }

    /* Nav */
    nav {
      position: sticky; top: 0; z-index: 100;
      padding: 0 48px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(237,236,245,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); text-decoration: none; }
    .nav-logo span { color: var(--blue); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-back { font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--navy); }

    /* User pill */
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--blue-pale); border: 2px solid rgba(74,114,214,0.25);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-avatar svg { width: 18px; height: 18px; color: var(--blue); }
    .nav-user-info { display: flex; flex-direction: column; }
    .nav-name  { font-size: 13px; font-weight: 700; color: var(--navy); line-height: 1.2; }
    .nav-email { font-size: 11px; color: var(--muted); line-height: 1.2; }

    .logout-btn {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); padding: 6px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--blue); color: var(--navy); }

    /* Layout */
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }
    .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }

    /* Greeting */
    .greeting { margin-bottom: 40px; }
    .greeting h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); margin-bottom: 4px; }
    .greeting p  { font-size: 14px; color: var(--muted); }

    /* Section label */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--blue); text-transform: uppercase; margin-bottom: 14px;
      font-family: 'DM Mono', monospace;
    }

    /* Enrolled cards */
    .enrolled-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 52px; }
    .enrolled-card {
      background: var(--surface-2);
      border-radius: 14px; border: 1px solid var(--border);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 18px;
      box-shadow: 0 2px 12px rgba(74,114,214,0.06);
      transition: border-color 0.2s;
    }
    .enrolled-card:hover { border-color: var(--blue); }
    .enrolled-icon { font-size: 32px; flex-shrink: 0; }
    .enrolled-info { flex: 1; }
    .enrolled-info h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .enrolled-info p  { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .enrolled-badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
    .badge-free { background: var(--blue-pale); color: var(--blue); }
    .badge-paid { background: rgba(29,158,117,0.12); color: #117A57; }
    .resume-btn {
      display: inline-block; background: var(--navy); color: #fff;
      text-decoration: none; font-size: 13px; font-weight: 700;
      padding: 10px 20px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s;
    }
    .resume-btn:hover { background: var(--blue); }

    /* Explore grid */
    .explore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
    .explore-card {
      background: var(--surface-2); border-radius: 14px;
      border: 1px solid var(--border); padding: 20px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 12px rgba(74,114,214,0.06);
      transition: border-color 0.2s;
    }
    .explore-card:hover { border-color: var(--blue); }
    .explore-icon { font-size: 26px; }
    .explore-level {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .explore-card h4 { font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.4; }
    .explore-card p  { font-size: 12px; color: var(--muted); line-height: 1.65; flex: 1; }
    .explore-price   { font-size: 15px; font-weight: 800; color: var(--navy); }
    .explore-btn {
      display: block; background: var(--surface); color: var(--navy);
      text-decoration: none; font-size: 12px; font-weight: 700;
      padding: 8px 14px; border-radius: 8px; text-align: center;
      border: 1.5px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
    }
    .explore-btn:hover { background: var(--blue-pale); border-color: var(--blue); }
    .explore-btn.disabled {
      color: var(--muted); background: var(--surface);
      border-color: var(--border); cursor: default; pointer-events: none;
    }

    @media (max-width: 768px) { nav { padding: 0 20px; } .container { padding: 32px 16px 60px; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Klaud<span>.id</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← Beranda</a>
    <div class="nav-user">
      <div class="nav-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="nav-user-info">
        <span class="nav-name"  id="navName"></span>
        <span class="nav-email" id="navEmail"></span>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Keluar</button>
  </div>
</nav>

<div class="container">
  <div id="loading" class="loading">Memuat dashboard kamu...</div>

  <div id="content" style="display:none;">
    <div class="greeting">
      <h1 id="greetingText">Hei! 👋</h1>
      <p id="greetingSub">Selamat datang kembali di Klaud.id</p>
    </div>

    <div id="enrolledSection" style="display:none;">
      <div class="section-label">Kursus Kamu</div>
      <div class="enrolled-list" id="enrolledList"></div>
    </div>

    <div id="exploreSection" style="display:none;">
      <div class="section-label">Jelajahi Kursus Lainnya</div>
      <div class="explore-grid" id="exploreGrid"></div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://bolagqhgagmiewjdjzgz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_U3DV1nZq3MXdOkfI8oUZdg_EB025f9q';
  const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ALL_COURSES = {
    'prompt-gratis':      { title: '20 Prompt Claude Terbaik',             icon: '🎁', contentLink: 'prompt-gratis-content.html',    salesLink: 'prompt-gratis.html',     desc: 'Prompt siap pakai untuk email, laporan, konten sosmed, dan lainnya.',             price: 'Gratis',     level: 'Gratis' },
    'mulai-claude':       { title: 'Mulai dengan Claude AI',                icon: '🚀', contentLink: 'mulai-claude-content.html',      salesLink: 'mulai-claude.html',      desc: 'Dari nol sampai bisa pakai Claude untuk kebutuhan sehari-hari — dalam 1 jam.',    price: 'Gratis',     level: 'Beginner' },
    'kerja-sehari-hari':  { title: 'Claude untuk Pekerjaan Sehari-hari',    icon: '💼', contentLink: 'kerja-sehari-hari-content.html', salesLink: 'kerja-sehari-hari.html', desc: 'Hemat 3–5 jam kerja per minggu dengan workflow Claude + tools kantor kamu.',     price: 'Rp 149.000', level: 'Beginner' },
    'bisnis-ukm':         { title: 'Claude untuk Bisnis & UKM',             icon: '🏪', contentLink: 'bisnis-ukm-content.html',        salesLink: 'bisnis-ukm.html',        desc: 'Jalankan bisnis lebih efisien dengan Claude + tools Indonesia sehari-hari.',      price: 'Rp 149.000', level: 'Beginner' },
    'konten-copywriting': { title: 'Claude untuk Konten & Copywriting',     icon: '✍️', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Build mesin konten: artikel, script, newsletter, landing page — workflow nyata.', price: 'Rp 199.000', level: 'Intermediate', comingSoon: true },
    'analisis-data':      { title: 'Claude untuk Analisis Data',            icon: '📊', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Ubah data mentah jadi insight dengan Google Sheets + Claude Artifacts.',          price: 'Rp 199.000', level: 'Intermediate', comingSoon: true },
    'build-automation':   { title: 'Build Automation dengan Claude',        icon: '⚡', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Buat 3 automation aktif dengan Zapier + Make + n8n yang jalan 24/7.',            price: 'Rp 299.000', level: 'Intermediate', comingSoon: true },
    'ai-powered-app':     { title: 'Build AI-Powered App Sederhana',        icon: '🛠️', contentLink: 'coming-soon.html',             salesLink: 'coming-soon.html',       desc: 'Buat web app AI live di GitHub Pages dengan landing page monetisasi.',            price: 'Rp 299.000', level: 'Advanced',     comingSoon: true },
    'claude-api-dev':     { title: 'Claude API untuk Developer',            icon: '👨‍💻', contentLink: 'coming-soon.html',            salesLink: 'coming-soon.html',       desc: 'Integrasikan Claude ke project nyata: streaming, tool use, caching, deploy.',    price: 'Rp 399.000', level: 'Advanced',     comingSoon: true },
    'jual-produk-ai':     { title: 'Build & Jual Produk AI',                icon: '💰', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Dari ide ke produk AI yang menghasilkan uang: Framer + Midtrans + WhatsApp.',    price: 'Rp 499.000', level: 'Advanced',     comingSoon: true },
  };

  async function init() {
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const email = session.user.email;
    const name  = session.user.user_metadata?.full_name || email.split('@')[0];

    document.getElementById('navName').textContent = name;
    document.getElementById('navEmail').textContent = email;
    document.getElementById('greetingText').textContent = `Selamat datang, ${name}! 👋`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    // Auto-enroll in free course
    try {
      await sbClient.from('enrollments').upsert({
        email, course_slug: 'prompt-gratis',
        course_name: '20 Prompt Claude Terbaik', type: 'free',
      }, { onConflict: 'email,course_slug', ignoreDuplicates: true });
    } catch (e) { console.log('Upsert skipped:', e.message); }

    // Fetch enrollments
    const { data: enrollments, error: enrollErr } = await sbClient
      .from('enrollments')
      .select('course_slug, course_name, type, enrolled_at')
      .eq('email', email)
      .order('enrolled_at', { ascending: false });

    if (enrollErr) console.error('❌ Enrollments error:', enrollErr.message);

    const enrolled = (enrollments || []).filter(e => ALL_COURSES[e.course_slug]);
    const enrolledSlugs = new Set(enrolled.map(e => e.course_slug));

    // Enrolled section
    if (enrolled.length > 0) {
      document.getElementById('enrolledSection').style.display = 'block';
      const list = document.getElementById('enrolledList');
      enrolled.forEach(c => {
        const meta    = ALL_COURSES[c.course_slug];
        const dateStr = new Date(c.enrolled_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        const badge   = c.type === 'free'
          ? `<span class="enrolled-badge badge-free">🎁 Gratis</span>`
          : `<span class="enrolled-badge badge-paid">✓ Aktif</span>`;
        list.innerHTML += `
          <div class="enrolled-card">
            <div class="enrolled-icon">${meta.icon}</div>
            <div class="enrolled-info">
              <h3>${meta.title}</h3>
              <p>${c.type === 'free' ? 'Diikuti' : 'Dibeli'} ${dateStr} &nbsp;${badge}</p>
            </div>
            <a href="${meta.contentLink}" class="resume-btn">Mulai →</a>
          </div>`;
      });
    }

    // Explore section
    const unenrolled = Object.entries(ALL_COURSES).filter(([slug]) => !enrolledSlugs.has(slug));
    if (unenrolled.length > 0) {
      document.getElementById('exploreSection').style.display = 'block';
      const grid = document.getElementById('exploreGrid');
      unenrolled.forEach(([slug, meta]) => {
        const ctaBtn = meta.comingSoon
          ? `<div class="explore-btn disabled">🔔 Segera Hadir</div>`
          : `<a href="${meta.salesLink}" class="explore-btn">Lihat Kursus →</a>`;
        grid.innerHTML += `
          <div class="explore-card">
            <div class="explore-level">${meta.level}</div>
            <div class="explore-icon">${meta.icon}</div>
            <h4>${meta.title}</h4>
            <p>${meta.desc}</p>
            <div class="explore-price">${meta.price}</div>
            ${ctaBtn}
          </div>`;
      });
    }
  }

  async function logout() {
    await sbClient.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
