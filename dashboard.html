<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Klaud.id</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      --bg: #F8F9FC; --sidebar: #FFFFFF; --surface: #FFFFFF;
      --navy: #13163A; --blue: #4A72D6; --blue-pale: #EEF2FF;
      --green: #1D9E75; --green-pale: #ECFDF5;
      --gold: #EF9F27; --gold-pale: rgba(239,159,39,0.08);
      --muted: #6B7080; --border: #E8EAF0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }

    /* Nav */
    nav {
      height: 56px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); text-decoration: none; }
    .nav-logo span { color: var(--blue); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover { color: var(--navy); }
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--blue-pale); border: 2px solid rgba(74,114,214,0.2);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .nav-avatar svg { width: 16px; height: 16px; color: var(--blue); }
    .nav-uinfo { display: flex; flex-direction: column; }
    .nav-uname  { font-size: 12px; font-weight: 700; color: var(--navy); line-height: 1.2; }
    .nav-uemail { font-size: 10px; color: var(--muted); line-height: 1.2; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
    .logout-btn:hover { border-color: var(--blue); color: var(--navy); }

    /* Layout */
    .layout { display: flex; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 0; }

    /* Sidebar */
    .sidebar {
      width: 260px; flex-shrink: 0;
      padding: 24px 16px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 20px;
    }

    /* Profile card */
    .profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 16px; text-align: center;
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 12px;
      background: var(--blue-pale); border: 3px solid rgba(74,114,214,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .profile-name  { font-size: 15px; font-weight: 800; color: var(--navy); margin-bottom: 2px; }
    .profile-email { font-size: 11px; color: var(--muted); margin-bottom: 14px; word-break: break-all; }
    .profile-since { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; background: var(--bg); padding: 4px 10px; border-radius: 100px; display: inline-block; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 8px; text-align: center;
    }
    .stat-num  { font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -0.5px; line-height: 1; margin-bottom: 3px; }
    .stat-lbl  { font-size: 10px; color: var(--muted); line-height: 1.3; }

    /* Quick nav */
    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      font-family: 'DM Mono', monospace; padding: 0 4px; margin-bottom: 4px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 500; color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-nav-item:hover { background: var(--bg); color: var(--navy); }
    .sidebar-nav-item.active { background: var(--blue-pale); color: var(--blue); font-weight: 600; }
    .sidebar-nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Learning Journey */
    .journey-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
    }
    .journey-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
    .journey-level { margin-bottom: 14px; }
    .journey-level:last-child { margin-bottom: 0; }
    .journey-level-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px; font-family: 'DM Mono', monospace;
    }
    .journey-level-label.beginner  { color: var(--green); }
    .journey-level-label.intermediate { color: var(--gold); }
    .journey-level-label.advanced  { color: var(--blue); }
    .journey-courses { display: flex; flex-direction: column; gap: 4px; }
    .journey-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; border-radius: 6px;
      font-size: 11px; color: var(--muted);
    }
    .journey-item.enrolled { color: var(--navy); font-weight: 600; background: var(--bg); }
    .journey-item.completed { color: var(--green); background: var(--green-pale); }
    .journey-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .journey-item.enrolled .journey-dot { background: var(--blue); }
    .journey-item.completed .journey-dot { background: var(--green); }
    .journey-item.coming .journey-dot { background: var(--border); }

    /* Main content */
    .main { flex: 1; padding: 28px 32px; min-width: 0; }

    .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }

    /* Greeting */
    .greeting { margin-bottom: 28px; }
    .greeting h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); margin-bottom: 3px; }
    .greeting p  { font-size: 13px; color: var(--muted); }

    /* Section */
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 12px; }

    /* Enrolled cards */
    .enrolled-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 36px; }
    .enrolled-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .enrolled-card:hover { border-color: var(--blue); box-shadow: 0 2px 16px rgba(74,114,214,0.08); }
    .enrolled-icon { font-size: 28px; flex-shrink: 0; }
    .enrolled-info { flex: 1; min-width: 0; }
    .enrolled-info h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .enrolled-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .enrolled-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 100px; }
    .badge-free { background: var(--blue-pale); color: var(--blue); }
    .badge-paid { background: var(--green-pale); color: var(--green); }

    /* Progress bar */
    .course-progress { display: flex; align-items: center; gap: 8px; }
    .cpb-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 10px; overflow: hidden; }
    .cpb-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
    .cpb-fill.blue { background: var(--blue); }
    .cpb-fill.gold { background: var(--gold); }
    .cpb-label { font-size: 10px; color: var(--muted); white-space: nowrap; font-family: 'DM Mono', monospace; }

    .resume-btn {
      display: inline-block; background: var(--navy); color: #fff;
      text-decoration: none; font-size: 12px; font-weight: 700;
      padding: 8px 18px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
      transition: background 0.2s;
    }
    .resume-btn:hover { background: var(--blue); }

    /* Explore carousel */
    .carousel-wrap { position: relative; }
    .explore-grid {
      display: flex; gap: 12px;
      overflow-x: auto; scroll-snap-type: x mandatory;
      padding-bottom: 8px; scrollbar-width: none;
    }
    .explore-grid::-webkit-scrollbar { display: none; }
    .carousel-nav { display: flex; gap: 8px; margin-top: 14px; }
    .carousel-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      color: var(--navy); flex-shrink: 0;
    }
    .carousel-btn:hover { border-color: var(--blue); background: var(--blue-pale); }
    .carousel-btn svg { width: 13px; height: 13px; }
    .explore-card {
      min-width: 210px; max-width: 210px;
      scroll-snap-align: start; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.2s;
    }
    .explore-card:hover { border-color: var(--blue); }
    .explore-level { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .explore-icon { font-size: 22px; }
    .explore-card h4 { font-size: 13px; font-weight: 700; color: var(--navy); line-height: 1.4; }
    .explore-card p  { font-size: 11px; color: var(--muted); line-height: 1.6; flex: 1; }
    .explore-price   { font-size: 13px; font-weight: 800; color: var(--navy); }
    .explore-btn {
      display: block; background: var(--bg); color: var(--navy);
      text-decoration: none; font-size: 11px; font-weight: 700;
      padding: 7px 12px; border-radius: 7px; text-align: center;
      border: 1px solid var(--border); transition: all 0.2s; margin-top: 2px;
    }
    .explore-btn:hover { background: var(--blue-pale); border-color: var(--blue); }
    .explore-btn.disabled { color: var(--muted); pointer-events: none; }

    @media (max-width: 900px) { .sidebar { display: none; } }
    @media (max-width: 768px) { .main { padding: 20px 16px; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Klaud<span>.id</span></a>
  <div class="nav-right">
    <a href="index.html#kursus" class="nav-link">Kursus</a>
    <div class="nav-user">
      <div class="nav-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>

</nav>

<div id="loadingScreen" class="loading" style="flex:1;display:flex;align-items:center;justify-content:center;">Memuat dashboard kamu...</div>

<div class="layout" id="mainLayout" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Profile -->
    <div class="profile-card">
      <div class="profile-avatar">🧑‍💻</div>
      <div class="profile-name"  id="sideName"></div>
      <div class="profile-email" id="sideEmail"></div>
      <div class="profile-since" id="sideSince"></div>
    </div>

    <!-- Stats -->
    <div>
      <div class="sidebar-section-label">Statistik Belajar</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="statEnrolled">0</div>
          <div class="stat-lbl">Kursus Diikuti</div>
        </div>
        <div class="stat-box">

        <div class="stat-box">

    <!-- Quick Nav -->
    <div>
      <div class="sidebar-section-label">Navigasi</div>
      <div class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="index.html#kursus" class="sidebar-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Semua Kursus
        </a>
      </div>
    </div>

    <!-- Learning Journey -->
    <div class="journey-card">
      <div class="journey-title">🗺️ Learning Journey</div>

      <div class="journey-level">
        <div class="journey-level-label beginner">Beginner</div>
        <div class="journey-courses" id="journeyBeginner">
          <!-- populated by JS -->
        </div>
      </div>
      <div class="journey-level">
        <div class="journey-level-label intermediate">Intermediate</div>
        <div class="journey-courses" id="journeyIntermediate">
        </div>
      </div>
      <div class="journey-level">
        <div class="journey-level-label advanced">Advanced</div>
        <div class="journey-courses" id="journeyAdvanced">
        </div>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div id="loading" class="loading" style="display:none;"></div>

    <div id="content">
      <div class="greeting">
        <h1 id="greetingText">Hei! 👋</h1>
        <p id="greetingSub">Selamat datang kembali di Klaud.id</p>
      </div>

      <div id="enrolledSection" style="display:none;">
        <div class="section-label">Kursus Kamu</div>
        <div class="enrolled-list" id="enrolledList"></div>
      </div>

      <div id="exploreSection" style="display:none;">
        <div class="section-label">Jelajahi Kursus Lainnya</div>
        <div class="carousel-wrap">
          <div class="explore-grid" id="exploreGrid"></div>
          <div class="carousel-nav">
            <button class="carousel-btn" onclick="scrollExplore(-1)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="carousel-btn" onclick="scrollExplore(1)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const ALL_COURSES = {
    'prompt-gratis':      { title: '20 Prompt Claude Terbaik',          icon: '🎁', contentLink: 'prompt-gratis-content.html',    salesLink: 'prompt-gratis.html',     desc: 'Prompt siap pakai untuk email, laporan, konten sosmed, dan lainnya.',             price: 'Gratis',     level: 'Beginner',      modules: 5,  color: 'blue' },
    'mulai-claude':       { title: 'Mulai dengan Claude AI',             icon: '🚀', contentLink: 'mulai-claude-content.html',      salesLink: 'mulai-claude.html',      desc: 'Dari nol sampai bisa pakai Claude untuk kebutuhan sehari-hari — dalam 1 jam.',    price: 'Gratis',     level: 'Beginner',      modules: 6,  color: 'blue' },
    'kerja-sehari-hari':  { title: 'Claude untuk Pekerjaan Sehari-hari', icon: '💼', contentLink: 'kerja-sehari-hari-content.html', salesLink: 'kerja-sehari-hari.html', desc: 'Hemat 3–5 jam kerja per minggu dengan workflow Claude + tools kantor kamu.',     price: 'Rp 149.000', level: 'Beginner',      modules: 6,  color: 'blue' },
    'bisnis-ukm':         { title: 'Claude untuk Bisnis & UKM',          icon: '🏪', contentLink: 'bisnis-ukm-content.html',        salesLink: 'bisnis-ukm.html',        desc: 'Jalankan bisnis lebih efisien dengan Claude + tools Indonesia sehari-hari.',      price: 'Rp 149.000', level: 'Beginner',      modules: 6,  color: 'gold' },
    'konten-copywriting': { title: 'Claude untuk Konten & Copywriting',  icon: '✍️', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Build mesin konten: artikel, script, newsletter, landing page — workflow nyata.', price: 'Rp 199.000', level: 'Intermediate',  modules: 6,  color: 'blue', comingSoon: true },
    'analisis-data':      { title: 'Claude untuk Analisis Data',         icon: '📊', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Ubah data mentah jadi insight dengan Google Sheets + Claude Artifacts.',          price: 'Rp 199.000', level: 'Intermediate',  modules: 6,  color: 'blue', comingSoon: true },
    'build-automation':   { title: 'Build Automation dengan Claude',     icon: '⚡', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Buat 3 automation aktif dengan Zapier + Make + n8n yang jalan 24/7.',            price: 'Rp 299.000', level: 'Intermediate',  modules: 7,  color: 'blue', comingSoon: true },
    'ai-powered-app':     { title: 'Build AI-Powered App Sederhana',     icon: '🛠️', contentLink: 'coming-soon.html',             salesLink: 'coming-soon.html',       desc: 'Buat web app AI live di GitHub Pages dengan landing page monetisasi.',            price: 'Rp 299.000', level: 'Advanced',      modules: 7,  color: 'blue', comingSoon: true },
    'claude-api-dev':     { title: 'Claude API untuk Developer',         icon: '👨‍💻', contentLink: 'coming-soon.html',            salesLink: 'coming-soon.html',       desc: 'Integrasikan Claude ke project nyata: streaming, tool use, caching, deploy.',    price: 'Rp 399.000', level: 'Advanced',      modules: 7,  color: 'blue', comingSoon: true },
    'jual-produk-ai':     { title: 'Build & Jual Produk AI',             icon: '💰', contentLink: 'coming-soon.html',              salesLink: 'coming-soon.html',       desc: 'Dari ide ke produk AI yang menghasilkan uang: Framer + Midtrans + WhatsApp.',    price: 'Rp 499.000', level: 'Advanced',      modules: 7,  color: 'blue', comingSoon: true },
  };

  const LEVEL_ORDER = { 'Beginner': 0, 'Intermediate': 1, 'Advanced': 2 };

  // Progress map loaded from Supabase, keyed by course_slug
  let progressMap = {};

  async function loadProgress(email) {
    try {
      const { data } = await sbClient
        .from('module_completions')
        .select('course_slug, module_num, completed_at')
        .eq('email', email)
        .order('completed_at', { ascending: false });

      if (data) {
        data.forEach(row => {
          if (!progressMap[row.course_slug]) progressMap[row.course_slug] = new Set();
          progressMap[row.course_slug].add(row.module_num);
        });
        // Sync to localStorage as fallback
        Object.entries(progressMap).forEach(([slug, mods]) => {
          localStorage.setItem(`klaud_progress_${slug}`, mods.size);
        });
      }
    } catch (e) {
      // Fall back to localStorage if Supabase fails
    }
  }

  function getProgress(slug) {
    const total = ALL_COURSES[slug]?.modules || 0;
    if (total === 0) return { done: 0, total: 0, pct: 100 };
    const done = progressMap[slug]?.size
      ?? parseInt(localStorage.getItem(`klaud_progress_${slug}`) || '0');
    return { done, total, pct: Math.round((done / total) * 100) };
  }

  async function init() {
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const email = session.user.email;
    const name  = session.user.user_metadata?.full_name || email.split('@')[0];
    const joinDate = new Date(session.user.created_at).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

    // Nav
    document.getElementById('navUname').textContent  = name;
    document.getElementById('navUemail').textContent = email;

    // Sidebar profile
    document.getElementById('sideName').textContent  = name;
    document.getElementById('sideEmail').textContent = email;
    document.getElementById('sideSince').textContent = `Bergabung ${joinDate}`;

    // Greeting
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Selamat pagi' : hour < 17 ? 'Selamat siang' : 'Selamat malam';
    document.getElementById('greetingText').textContent = `${greet}, ${name}! 👋`;

    // Load progress from Supabase
    await loadProgress(email);

    // Auto-enroll free course
    try {
      await sbClient.from('enrollments').upsert({
        email, course_slug: 'prompt-gratis',
        course_name: '20 Prompt Claude Terbaik', type: 'free',
      }, { onConflict: 'email,course_slug', ignoreDuplicates: true });
    } catch (e) {}

    // Fetch enrollments
    const { data: enrollments } = await sbClient
      .from('enrollments')
      .select('course_slug, course_name, type, enrolled_at')
      .eq('email', email)
      .order('enrolled_at', { ascending: false });

    const enrolled = (enrollments || []).filter(e => ALL_COURSES[e.course_slug]);
    const enrolledSlugs = new Set(enrolled.map(e => e.course_slug));

    // Stats
    let totalModulesDone = 0;
    let totalModules = 0;
    enrolled.forEach(c => {
      const p = getProgress(c.course_slug);
      totalModulesDone += p.done;
      totalModules += p.total;
    });
    document.getElementById('statEnrolled').textContent = enrolled.length;
    document.getElementById('statModules').textContent  = totalModulesDone;
    document.getElementById('statPct').textContent      = totalModules > 0 ? Math.round((totalModulesDone / totalModules) * 100) + '%' : '—';

    // Learning Journey
    buildJourney(enrolledSlugs);

    // Enrolled section
    if (enrolled.length > 0) {
      document.getElementById('enrolledSection').style.display = 'block';
      const list = document.getElementById('enrolledList');
      enrolled.forEach(c => {
        const meta = ALL_COURSES[c.course_slug];
        const prog = getProgress(c.course_slug);
        const dateStr = new Date(c.enrolled_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        const badge   = c.type === 'free'
          ? `<span class="enrolled-badge badge-free">Gratis</span>`
          : `<span class="enrolled-badge badge-paid">✓ Aktif</span>`;
        const progressBar = `
          <div class="course-progress">
            <div class="cpb-wrap"><div class="cpb-fill ${meta.color}" style="width:${prog.pct}%"></div></div>
            <span class="cpb-label">${prog.done}/${prog.total} bagian</span>
          </div>`;
        list.innerHTML += `
          <div class="enrolled-card">
            <div class="enrolled-icon">${meta.icon}</div>
            <div class="enrolled-info">
              <h3>${meta.title}</h3>
              <div class="enrolled-meta">${c.type === 'free' ? 'Diikuti' : 'Dibeli'} ${dateStr} &nbsp;${badge}</div>
              ${progressBar}
            </div>
            <a href="${meta.contentLink}" class="resume-btn">${prog.done > 0 ? 'Lanjutkan →' : 'Mulai →'}</a>
          </div>`;
      });
    }

    // Explore section
    const unenrolled = Object.entries(ALL_COURSES).filter(([slug]) => !enrolledSlugs.has(slug));
    if (unenrolled.length > 0) {
      document.getElementById('exploreSection').style.display = 'block';
      const grid = document.getElementById('exploreGrid');
      unenrolled.forEach(([slug, meta]) => {
        const ctaBtn = meta.comingSoon
          ? `<div class="explore-btn disabled">🔔 Segera Hadir</div>`
          : `<a href="${meta.salesLink}" class="explore-btn">Lihat Kursus →</a>`;
        grid.innerHTML += `
          <div class="explore-card">
            <div class="explore-level">${meta.level}</div>
            <div class="explore-icon">${meta.icon}</div>
            <h4>${meta.title}</h4>
            <p>${meta.desc}</p>
            <div class="explore-price">${meta.price}</div>
            ${ctaBtn}
          </div>`;
      });
    }

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainLayout').style.display    = 'flex';
  }

  function buildJourney(enrolledSlugs) {
    const beginnerSlugs     = ['prompt-gratis', 'mulai-claude', 'kerja-sehari-hari', 'bisnis-ukm'];
    const intermediateSlugs = ['konten-copywriting', 'analisis-data', 'build-automation'];
    const advancedSlugs     = ['ai-powered-app', 'claude-api-dev', 'jual-produk-ai'];

    function renderLevel(slugs, containerId) {
      const el = document.getElementById(containerId);
      slugs.forEach(slug => {
        const meta = ALL_COURSES[slug];
        const isEnrolled  = enrolledSlugs.has(slug);
        const prog = getProgress(slug);
        const isCompleted = isEnrolled && prog.pct === 100;
        const cls = isCompleted ? 'completed' : isEnrolled ? 'enrolled' : 'coming';
        el.innerHTML += `
          <div class="journey-item ${cls}">
            <span class="journey-dot"></span>
            ${meta.icon} ${meta.title.replace('Claude untuk ', '').replace(' dengan Claude', '')}
          </div>`;
      });
    }

    renderLevel(beginnerSlugs,     'journeyBeginner');
    renderLevel(intermediateSlugs, 'journeyIntermediate');
    renderLevel(advancedSlugs,     'journeyAdvanced');
  }

  function scrollExplore(dir) {
    document.getElementById('exploreGrid').scrollBy({ left: dir * 234, behavior: 'smooth' });
  }

  async function logout() {
    await sbClient.auth.signOut();
    window.location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
