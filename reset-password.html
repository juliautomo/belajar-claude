<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Belajar Claude</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      --bg: #FAFAFA; --border: #E8E8E8;
      --ink: #111111; --ink-2: #777777;
      --accent: #6C47FF;
      --font: 'Geist', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font); background: var(--bg);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, #D8D8DC 1px, transparent 1px);
      background-size: 26px 26px; opacity: 0.5;
      mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, black 20%, transparent 80%);
    }
    .card {
      background: #fff; border-radius: 20px; padding: 44px 40px 36px;
      max-width: 400px; width: 100%;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border); position: relative; z-index: 1;
    }
    .logo { font-size: 17px; font-weight: 700; color: var(--ink);
      letter-spacing: -0.4px; margin-bottom: 28px; display: block;
      text-decoration: none; }
    .logo span { color: var(--accent); }
    h2 { font-size: 18px; font-weight: 700; color: var(--ink);
      margin-bottom: 6px; letter-spacing: -0.3px; }
    p.sub { font-size: 14px; color: var(--ink-2); margin-bottom: 24px; line-height: 1.6; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--ink); outline: none;
      transition: border-color 0.2s; margin-bottom: 14px;
      font-family: inherit; background: #fff;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 13px; background: var(--ink); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
    .msg {
      margin-top: 14px; padding: 12px 14px; border-radius: 10px;
      font-size: 13px; text-align: center; line-height: 1.6; display: none;
    }
    .msg.success { background: #ECFDF5; color: #065F46; display: block; }
    .msg.error   { background: #FEE2E2; color: #991B1B; display: block; }
    .back { display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--ink-2); text-decoration: none; }
    .back:hover { color: var(--ink); }
    #invalid-section { text-align: center; }
    #invalid-section p { font-size: 14px; color: var(--ink-2); margin-bottom: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="index.html">belajar<span>claude</span></a>

    <!-- Valid recovery token: show new password form -->
    <div id="reset-section" style="display:none;">
      <h2>Buat Password Baru</h2>
      <p class="sub">Masukkan password baru kamu di bawah ini.</p>
      <label for="new-password">Password Baru</label>
      <input type="password" id="new-password" placeholder="Minimal 6 karakter" autocomplete="new-password" />
      <label for="confirm-password">Konfirmasi Password</label>
      <input type="password" id="confirm-password" placeholder="Ulangi password baru" autocomplete="new-password" />
      <button class="btn" id="reset-btn" onclick="doReset()">Simpan Password Baru →</button>
      <div class="msg" id="reset-msg"></div>
    </div>

    <!-- Invalid / missing token -->
    <div id="invalid-section" style="display:none;">
      <h2>Link Tidak Valid</h2>
      <p>Link reset password sudah kadaluarsa atau tidak valid. Silakan minta link baru.</p>
      <a href="login.html" class="btn" style="display:block;text-decoration:none;text-align:center;">
        Minta Link Reset Baru
      </a>
    </div>

    <!-- Loading state -->
    <div id="loading-section">
      <p style="text-align:center;color:var(--ink-2);font-size:14px;">Memverifikasi...</p>
    </div>

    <a href="index.html" class="back">← Kembali ke beranda</a>
  </div>

  <script>
    // Supabase handles recovery tokens via URL hash (#access_token=...&type=recovery)
    // The onAuthStateChange event fires with SIGNED_IN + recovery type
    (function() {
      var loaded = false;

      sbClient.auth.onAuthStateChange(function(event, session) {
        if (loaded) return;
        loaded = true;
        document.getElementById('loading-section').style.display = 'none';

        if (event === 'PASSWORD_RECOVERY') {
          // Valid recovery session — show new password form
          document.getElementById('reset-section').style.display = 'block';
        } else if (session) {
          // Already fully logged in — redirect to dashboard
          window.location.href = 'dashboard.html';
        } else {
          // No valid token
          document.getElementById('invalid-section').style.display = 'block';
        }
      });

      // Fallback: if no auth event fires within 3s, show invalid
      setTimeout(function() {
        if (!loaded) {
          loaded = true;
          document.getElementById('loading-section').style.display = 'none';
          document.getElementById('invalid-section').style.display = 'block';
        }
      }, 3000);
    })();

    async function doReset() {
      var newPw = document.getElementById('new-password').value;
      var confPw = document.getElementById('confirm-password').value;
      var btn = document.getElementById('reset-btn');
      var msg = document.getElementById('reset-msg');

      if (!newPw || newPw.length < 6) return showMsg(msg, 'error', 'Password minimal 6 karakter.');
      if (newPw !== confPw) return showMsg(msg, 'error', 'Konfirmasi password tidak cocok.');

      btn.disabled = true; btn.textContent = 'Menyimpan...';
      msg.style.display = 'none';

      var res = await sbClient.auth.updateUser({ password: newPw });
      if (res.error) {
        showMsg(msg, 'error', res.error.message);
        btn.disabled = false; btn.textContent = 'Simpan Password Baru →';
      } else {
        showMsg(msg, 'success', 'Password berhasil diubah! Mengarahkan ke dashboard...');
        btn.textContent = 'Berhasil!';
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
      }
    }

    function showMsg(el, type, text) {
      el.textContent = text; el.className = 'msg ' + type;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doReset();
    });
  </script>
</body>
</html>
