<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Klaud.id</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
  :root {
    --bg: #F7F7F5; --surface: #FFFFFF;
    --ink: #111111; --blue: #4A72D6; --blue-pale: #EEF2FF;
    --green: #1D9E75; --green-pale: #ECFDF5;
    --muted: #6B7280; --border: #E5E5E3;
    --gold: #EF9F27; --gold-pale: rgba(239,159,39,0.08);
    --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.05);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
  }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh -webkit-font-smoothing: antialiased;;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px 36px;
      max-width: 400px; width: 100%;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink);
    }
    .logo span { color: #4A72D6; }
    h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.3px; }
    .sub { font-size: 14px; color: var(--muted); line-height: 1.65; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="email"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--ink); outline: none;
      transition: border-color 0.2s; margin-bottom: 14px;
      font-family: inherit; background: #fff;
    }
    input[type="email"]:focus { border-color: #4A72D6; }
    .btn {
      width: 100%; padding: 13px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { background: #9CA3AF; cursor: not-allowed; }
    .msg {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 10px; font-size: 13px;
      text-align: center; line-height: 1.6; display: none;
    }
    .msg.success { background: #ECFDF5; color: #065F46; display: block; }
    .msg.error   { background: #FEE2E2; color: #991B1B; display: block; }
    .note { margin-top: 20px; font-size: 12px; color: #9CA3AF; text-align: center; line-height: 1.6; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Klaud<span>.id</span></div>
    <h2>Masuk atau Daftar</h2>
    <p class="sub">Masukkan email kamu — kami kirimkan link masuk langsung ke inbox. Tidak perlu password.</p>
    <div id="form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nama@email.com" autofocus />
      <button class="btn" id="btn" onclick="sendLink()">Lanjutkan →</button>
    </div>
    <div class="msg" id="msg"></div>
    <p class="note">Dengan melanjutkan, kamu menyetujui syarat & ketentuan Klaud.id.</p>
    <a href="index.html" class="back">← Kembali ke beranda</a>
  </div>

  <script>
    // Redirect if already logged in
    (async function() {
      var r = await sbClient.auth.getSession();
      if (r.data.session) window.location.href = 'dashboard.html';
    })();

    async function sendLink() {
      var email = document.getElementById('email').value.trim();
      var btn   = document.getElementById('btn');
      var msg   = document.getElementById('msg');
      if (!email || !email.includes('@')) {
        msg.textContent = 'Masukkan alamat email yang valid ya.';
        msg.className = 'msg error'; return;
      }
      btn.disabled = true; btn.textContent = 'Mengirim...';
      msg.className = 'msg'; msg.style.display = 'none';
      var result = await sbClient.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: 'https://juliautomo.github.io/klaud-id/dashboard.html' }
      });
      if (result.error) {
        msg.textContent = 'Gagal mengirim: ' + result.error.message;
        msg.className = 'msg error';
        btn.disabled = false; btn.textContent = 'Lanjutkan →';
      } else {
        btn.textContent = '✉️ Link terkirim!';
        btn.style.background = '#065F46';
        msg.innerHTML = 'Link masuk sudah dikirim ke <strong>' + email + '</strong>.<br>Cek inbox dan klik linknya untuk masuk.';
        msg.className = 'msg success';
        document.getElementById('form').style.opacity = '0.5';
        document.getElementById('form').style.pointerEvents = 'none';
      }
    }
    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendLink();
    });
  </script>
</body>
</html>
