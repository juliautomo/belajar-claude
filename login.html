<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Belajar Claude</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    :root {
      --bg: #FAFAFA; --surface: #FFFFFF; --surface-2: #F5F5F7;
      --border: #E8E8E8; --border-strong: #D0D0D0;
      --ink: #111111; --ink-2: #777777; --ink-3: #BBBBBB;
      --accent: #6C47FF; --accent-2: #9B7DFF;
      --accent-dim: rgba(108,71,255,0.08); --accent-glow: rgba(108,71,255,0.18);
      --green: #16A34A; --green-dim: rgba(22,163,74,0.08); --green-border: rgba(22,163,74,0.2);
      --gold: #EF9F27; --gold-pale: rgba(239,159,39,0.08);
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.05);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
      --serif: 'Instrument Serif', Georgia, serif;
      --font: 'Geist', sans-serif;
      --r: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, #D8D8DC 1px, transparent 1px);
      background-size: 26px 26px; opacity: 0.5;
      mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, black 20%, transparent 80%);
    }
    .card {
      background: #fff; border-radius: 20px; padding: 44px 40px 36px;
      max-width: 400px; width: 100%;
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border); position: relative; z-index: 1;
    }
    .logo { font-family: var(--font); font-size: 17px; font-weight: 700; color: var(--ink);
      letter-spacing: -0.4px; margin-bottom: 28px; display: block; }
    .logo span { color: var(--accent); }

    /* Tabs */
    .tabs { display: flex; margin-bottom: 28px;
      border-bottom: 1.5px solid var(--border); }
    .tab-btn {
      flex: 1; background: none; border: none; padding: 10px 0;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      color: var(--ink-2); cursor: pointer; position: relative;
      transition: color 0.15s;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -1.5px; left: 0; right: 0;
      height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
    }

    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--ink); outline: none;
      transition: border-color 0.2s; margin-bottom: 14px;
      font-family: inherit; background: #fff;
    }
    input[type="email"]:focus, input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 13px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
      font-family: inherit; margin-top: 2px;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { background: #9CA3AF; cursor: not-allowed; }

    .forgot-link {
      display: block; text-align: right; font-size: 12px;
      color: var(--accent); margin-top: -8px; margin-bottom: 16px;
      cursor: pointer; background: none; border: none;
      font-family: inherit; padding: 0;
    }
    .forgot-link:hover { text-decoration: underline; }

    .msg {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 10px; font-size: 13px;
      text-align: center; line-height: 1.6; display: none;
    }
    .msg.success { background: #ECFDF5; color: #065F46; display: block; }
    .msg.error   { background: #FEE2E2; color: #991B1B; display: block; }

    .note { margin-top: 20px; font-size: 12px; color: #9CA3AF; text-align: center; line-height: 1.6; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px;
      color: var(--ink-2); text-decoration: none; }
    .back:hover { color: var(--ink); }

    .view { display: none; }
    .view.active { display: block; }

    .back-link {
      display: inline-block; margin-top: 14px; font-size: 12px;
      color: var(--accent); cursor: pointer; background: none;
      border: none; font-family: inherit; padding: 0;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="index.html">belajar<span>claude</span></a>

    <!-- Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <!-- Login view -->
    <div class="view active" id="view-login">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="nama@email.com" autocomplete="email" autofocus />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Password kamu" autocomplete="current-password" />
      <button class="forgot-link" onclick="switchView('forgot')">Lupa password?</button>
      <button class="btn" id="login-btn" onclick="doLogin()">Masuk →</button>
      <div class="msg" id="login-msg"></div>
    </div>

    <!-- Register view -->
    <div class="view" id="view-register">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" placeholder="nama@email.com" autocomplete="email" />
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="Minimal 6 karakter" autocomplete="new-password" />
      <label for="reg-confirm">Konfirmasi Password</label>
      <input type="password" id="reg-confirm" placeholder="Ulangi password" autocomplete="new-password" style="margin-bottom:14px;" />
      <button class="btn" id="reg-btn" onclick="doRegister()">Daftar →</button>
      <div class="msg" id="reg-msg"></div>
    </div>

    <!-- Forgot password view -->
    <div class="view" id="view-forgot">
      <p style="font-size:14px;color:var(--ink-2);margin-bottom:20px;line-height:1.6;">
        Masukkan email kamu. Kami akan kirimkan link untuk buat password baru.
      </p>
      <label for="forgot-email">Email</label>
      <input type="email" id="forgot-email" placeholder="nama@email.com" />
      <button class="btn" id="forgot-btn" onclick="doForgot()">Kirim Link Reset →</button>
      <div class="msg" id="forgot-msg"></div>
      <button class="back-link" onclick="switchView('login')">← Kembali ke Masuk</button>
    </div>

    <p class="note">Dengan melanjutkan, kamu menyetujui syarat & ketentuan Belajar Claude.</p>
    <a href="index.html" class="back">← Kembali ke beranda</a>
  </div>

  <script>
    // Redirect if already logged in
    (async function() {
      var r = await sbClient.auth.getSession();
      if (r.data.session) window.location.href = 'dashboard.html';
    })();

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b, i) {
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      switchView(tab);
    }

    function switchView(view) {
      document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
      document.getElementById('view-' + view).classList.add('active');
      document.getElementById('tabs').style.display = view === 'forgot' ? 'none' : 'flex';
    }

    async function doLogin() {
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;
      var btn = document.getElementById('login-btn');
      var msg = document.getElementById('login-msg');

      if (!email || !password) return showMsg(msg, 'error', 'Isi email dan password ya.');
      btn.disabled = true; btn.textContent = 'Memproses...';
      msg.className = 'msg';

      var res = await sbClient.auth.signInWithPassword({ email: email, password: password });
      if (res.error) {
        var text = res.error.message.includes('Invalid login credentials')
          ? 'Email atau password salah. Belum punya password? Klik "Lupa password?" untuk buat password baru.'
          : res.error.message;
        showMsg(msg, 'error', text);
        btn.disabled = false; btn.textContent = 'Masuk →';
      } else {
        btn.textContent = 'Berhasil!';
        window.location.href = 'dashboard.html';
      }
    }

    async function doRegister() {
      var email = document.getElementById('reg-email').value.trim();
      var password = document.getElementById('reg-password').value;
      var confirm = document.getElementById('reg-confirm').value;
      var btn = document.getElementById('reg-btn');
      var msg = document.getElementById('reg-msg');

      if (!email || !password) return showMsg(msg, 'error', 'Isi semua kolom ya.');
      if (password.length < 6) return showMsg(msg, 'error', 'Password minimal 6 karakter.');
      if (password !== confirm) return showMsg(msg, 'error', 'Konfirmasi password tidak cocok.');

      btn.disabled = true; btn.textContent = 'Mendaftar...';
      msg.className = 'msg';

      var res = await sbClient.auth.signUp({ email: email, password: password });
      if (res.error) {
        showMsg(msg, 'error', res.error.message);
        btn.disabled = false; btn.textContent = 'Daftar →';
      } else if (res.data.session) {
        btn.textContent = 'Berhasil!';
        window.location.href = 'dashboard.html';
      } else {
        showMsg(msg, 'success', 'Cek inbox ' + email + ' untuk konfirmasi akun, lalu kembali ke sini untuk masuk.');
        btn.disabled = false; btn.textContent = 'Daftar →';
      }
    }

    async function doForgot() {
      var email = document.getElementById('forgot-email').value.trim();
      var btn = document.getElementById('forgot-btn');
      var msg = document.getElementById('forgot-msg');

      if (!email || !email.includes('@')) return showMsg(msg, 'error', 'Masukkan email yang valid ya.');
      btn.disabled = true; btn.textContent = 'Mengirim...';
      msg.className = 'msg';

      var res = await sbClient.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://belajar-claude.vercel.app/reset-password.html'
      });
      if (res.error) {
        showMsg(msg, 'error', res.error.message);
        btn.disabled = false; btn.textContent = 'Kirim Link Reset →';
      } else {
        showMsg(msg, 'success', 'Link reset sudah dikirim ke ' + email + '. Cek inbox kamu.');
        btn.textContent = 'Terkirim!';
      }
    }

    function showMsg(el, type, text) {
      el.textContent = text; el.className = 'msg ' + type;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      var active = document.querySelector('.view.active');
      if (!active) return;
      if (active.id === 'view-login') doLogin();
      else if (active.id === 'view-register') doRegister();
      else if (active.id === 'view-forgot') doForgot();
    });
  </script>
</body>
</html>
