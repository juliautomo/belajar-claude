<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Kamu — Belajar Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAFA;--surface:#FFFFFF;--surface-2:#F5F5F7;
  --border:#EBEBEB;--border-strong:#D8D8D8;
  --ink:#111111;--ink-2:#888888;--ink-3:#BBBBBB;
  --accent:#6C47FF;--accent-2:#8B6DFF;--accent-dim:rgba(108,71,255,0.08);--accent-glow:rgba(108,71,255,0.18);
  --green:#16A34A;--green-dim:rgba(22,163,74,0.08);--green-border:rgba(22,163,74,0.2);
  --font:'Geist',sans-serif;--serif:'Instrument Serif',Georgia,serif;
  --nav-h:58px;--sidebar-w:280px;--r:14px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,#DDDDE0 1px,transparent 1px);background-size:28px 28px;opacity:0.5;mask-image:radial-gradient(ellipse 80% 80% at 50% 0%,black 30%,transparent 100%);}
body::after{content:'';position:fixed;top:-200px;right:-100px;z-index:0;pointer-events:none;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(108,71,255,0.07) 0%,transparent 65%);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(250,250,250,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.brand{font-family: var(--font);font-size: 17px;font-weight: 700;color:var(--ink);text-decoration:none;letter-spacing: -0.4px;}
.brand span{color: var(--accent);}
.nav-right{display:flex;align-items:center;gap:12px;}
.btn-nav{font-family:var(--font);font-size:13px;font-weight:500;color:var(--ink-2);background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;transition:all 0.18s;}
.btn-nav:hover{color:var(--ink);border-color:var(--border-strong);background:var(--surface);}
.btn-accent{font-family:var(--font);font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:9px;padding:8px 18px;cursor:pointer;box-shadow:0 2px 12px var(--accent-glow);transition:all 0.18s;}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow);}
.btn-accent:disabled{opacity:0.5;cursor:default;transform:none;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;padding-top:var(--nav-h);position:relative;z-index:1;}
.loading-screen{text-align:center;padding:80px 20px;color:var(--ink-2);font-size:14px;}

/* SIDEBAR */
.sidebar{position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));border-right:1px solid var(--border);background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);padding:28px 16px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;}
.profile-block{padding:0 6px;}
.profile-sec-label{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.profile-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.profile-email{font-size:11px;color:var(--ink-3);margin-bottom:10px;word-break:break-all;}
.profile-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--green);background:var(--green-dim);border:1px solid var(--green-border);padding:3px 9px;border-radius:100px;}
.chip-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--ink);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-menu{display:flex;flex-direction:column;gap:1px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all 0.15s;text-decoration:none;}
.nav-item:hover{background:var(--surface-2);color:var(--ink);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.ni-icon svg{width:15px;height:15px;flex-shrink:0;}

/* MAIN */
.main{padding:40px 44px;display:flex;flex-direction:column;gap:28px;min-width:0;max-width:640px;}
.g-eyebrow{font-size:11px;font-weight:500;color:var(--ink-3);letter-spacing:0.04em;margin-bottom:8px;}
.g-h1{font-family:var(--serif);font-size:clamp(28px,3.5vw,40px);letter-spacing:-0.5px;line-height:1.1;color:var(--ink);margin-bottom:8px;}
.g-sub{font-size:13.5px;color:var(--ink-2);}

/* FORM CARD */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;display:flex;flex-direction:column;gap:26px;}
.field-group{display:flex;flex-direction:column;gap:8px;}
.field-label{font-size:13px;font-weight:600;color:var(--ink);}
.field-hint{font-size:12px;color:var(--ink-3);margin-top:-4px;}
.field-input{font-family:var(--font);font-size:14px;color:var(--ink);background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;transition:all 0.15s;width:100%;}
.field-input:focus{outline:none;border-color:var(--accent);background:#fff;}
.field-input:disabled{color:var(--ink-3);cursor:not-allowed;}
.field-opts{display:flex;flex-wrap:wrap;gap:8px;}
.popt{padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;background:#fff;transition:all 0.15s;font-family:var(--font);}
.popt:hover{border-color:var(--accent);color:var(--ink);}
.popt.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);font-weight:600;}
.form-divider{height:1px;background:var(--border);}
.form-footer{display:flex;align-items:center;gap:14px;}
.save-msg{font-size:13px;font-weight:600;color:var(--green);opacity:0;transition:opacity 0.2s;}
.save-msg.show{opacity:1;}

@media(max-width:900px){.sidebar{display:none;}.main{padding:24px 20px;}}
</style>
</head>
<body>

<nav>
  <a class="brand" href="index.html">belajar<span>claude</span></a>
  <div class="nav-right">
    <button class="btn-nav" onclick="logout()">Keluar</button>
  </div>
</nav>

<div id="loadingScreen" class="loading-screen" style="padding-top:120px;">Memuat profil...</div>

<div class="layout" id="mainLayout" style="display:none;">
  <aside class="sidebar">
    <div class="profile-block">
      <div class="profile-sec-label">Akun</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="nav-avatar" id="navAvatar">—</div>
        <div style="min-width:0;">
          <div class="profile-name" id="sideName" style="margin-bottom:0;"></div>
          <div class="profile-email" id="sideEmail" style="margin-bottom:0;"></div>
        </div>
      </div>
      <div class="profile-chip" style="margin-bottom:12px;"><span class="chip-dot"></span><span id="sideSince"></span></div>
      <a class="btn-accent" style="width:100%;display:block;text-align:center;box-sizing:border-box;padding:8px 12px;font-size:12.5px;text-decoration:none;" href="profile.html">Edit Profil</a>
    </div>
    <div class="nav-menu">
      <a class="nav-item" href="dashboard.html">
        <span class="ni-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Dashboard
      </a>
      <div class="nav-item active">
        <span class="ni-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profil
      </div>
      <a class="nav-item" id="adminNavItem" href="admin.html" style="display:none;">
        <span class="ni-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg></span>Admin
      </a>
    </div>
  </aside>

  <main class="main">
    <div>
      <div class="g-eyebrow">Akun</div>
      <h1 class="g-h1">Profil Kamu</h1>
      <p class="g-sub">Kelola info akun dan preferensi belajarmu supaya rekomendasi kursus makin relevan.</p>
    </div>

    <div class="form-card">
      <div class="field-group">
        <label class="field-label">Nama Lengkap</label>
        <input class="field-input" id="fName" type="text" placeholder="Nama kamu">
      </div>
      <div class="field-group">
        <label class="field-label">Username</label>
        <input class="field-input" id="fUsername" type="text" placeholder="username-kamu">
        <span class="field-hint">Huruf kecil, angka, dan tanda hubung saja.</span>
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="fEmail" type="text" disabled>
        <span class="field-hint">Email tidak bisa diubah di sini.</span>
      </div>

      <div class="form-divider"></div>

      <div class="field-group">
        <label class="field-label">Kamu saat ini sebagai apa?</label>
        <div class="field-opts" id="optsRole">
          <button type="button" class="popt" data-val="karyawan">Karyawan</button>
          <button type="button" class="popt" data-val="mahasiswa">Mahasiswa</button>
          <button type="button" class="popt" data-val="pemilik-bisnis">Pemilik Bisnis / UKM</button>
          <button type="button" class="popt" data-val="developer">Developer</button>
          <button type="button" class="popt" data-val="kreator">Kreator Konten</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Apa tujuan utama kamu belajar Claude?</label>
        <div class="field-opts" id="optsGoal">
          <button type="button" class="popt" data-val="efisiensi-kerja">Hemat waktu kerja</button>
          <button type="button" class="popt" data-val="bisnis">Kembangkan bisnis</button>
          <button type="button" class="popt" data-val="konten">Buat konten lebih cepat</button>
          <button type="button" class="popt" data-val="coding">Build produk / app</button>
          <button type="button" class="popt" data-val="lainnya">Eksplorasi</button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Seberapa sering kamu pakai Claude atau AI sekarang?</label>
        <div class="field-opts" id="optsExperience">
          <button type="button" class="popt" data-val="belum-pernah">Belum pernah</button>
          <button type="button" class="popt" data-val="sudah-mahir">Sudah pakai rutin</button>
        </div>
      </div>

      <div class="form-divider"></div>

      <div class="form-footer">
        <button class="btn-accent" id="saveBtn" onclick="saveProfile()">Simpan Perubahan</button>
        <span class="save-msg" id="saveMsg">Tersimpan!</span>
      </div>
    </div>
  </main>
</div>

<script>
let currentEmail = null;
let answers = { role: null, goal: null, experience: null };

function getInitials(name){
  return (name||'').trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase() || '?';
}

function selectOpt(groupId, val){
  document.querySelectorAll('#'+groupId+' .popt').forEach(function(b){
    b.classList.toggle('selected', b.getAttribute('data-val') === val);
  });
}

document.querySelectorAll('#optsRole .popt').forEach(function(b){b.addEventListener('click', function(){answers.role = b.getAttribute('data-val'); selectOpt('optsRole', answers.role);});});
document.querySelectorAll('#optsGoal .popt').forEach(function(b){b.addEventListener('click', function(){answers.goal = b.getAttribute('data-val'); selectOpt('optsGoal', answers.goal);});});
document.querySelectorAll('#optsExperience .popt').forEach(function(b){b.addEventListener('click', function(){answers.experience = b.getAttribute('data-val'); selectOpt('optsExperience', answers.experience);});});

async function logout(){await sbClient.auth.signOut();window.location.href='index.html';}

async function saveProfile(){
  var btn = document.getElementById('saveBtn');
  var msg = document.getElementById('saveMsg');
  var name = document.getElementById('fName').value.trim();
  var username = document.getElementById('fUsername').value.trim();
  btn.disabled = true;
  var original = btn.textContent;
  btn.textContent = 'Menyimpan...';
  msg.classList.remove('show');
  try {
    await sbClient.from('profiles').upsert({
      email: currentEmail,
      full_name: name || null,
      username: username || null,
      role: answers.role,
      goal: answers.goal,
      experience: answers.experience,
      updated_at: new Date().toISOString()
    }, { onConflict: 'email' });
    document.getElementById('sideName').textContent = name || currentEmail.split('@')[0];
    document.getElementById('navAvatar').textContent = getInitials(name || currentEmail.split('@')[0]);
    msg.classList.add('show');
    setTimeout(function(){ msg.classList.remove('show'); }, 2500);
  } catch (e) {
    console.error(e);
    alert('Gagal menyimpan profil. Coba lagi.');
  }
  btn.disabled = false;
  btn.textContent = original;
}

async function init(){
  try { await _init(); } catch (err) {
    console.error(err);
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainLayout').style.display = 'grid';
  }
}

async function _init(){
  var sr = await sbClient.auth.getSession();
  var session = sr.data.session;
  if (!session) { window.location.href = 'login.html'; return; }
  currentEmail = session.user.email;

  var ADMIN_EMAILS = ['julia.utomo@gmail.com', 'tiffany.utomo@gmail.com'];
  if (ADMIN_EMAILS.indexOf(currentEmail.toLowerCase()) !== -1) {
    document.getElementById('adminNavItem').style.display = 'flex';
  }

  var authName = (session.user.user_metadata && session.user.user_metadata.full_name) || currentEmail.split('@')[0];
  var joinDate = new Date(session.user.created_at).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

  var profile = null;
  try {
    var pr = await sbClient.from('profiles').select('*').eq('email', currentEmail).maybeSingle();
    profile = pr.data;
  } catch (e) { profile = null; }

  var displayName = (profile && profile.full_name) || authName;
  document.getElementById('navAvatar').textContent = getInitials(displayName);
  document.getElementById('sideName').textContent = displayName;
  document.getElementById('sideEmail').textContent = currentEmail;
  document.getElementById('sideSince').textContent = 'Bergabung ' + joinDate;

  document.getElementById('fName').value = displayName;
  document.getElementById('fUsername').value = (profile && profile.username) || '';
  document.getElementById('fEmail').value = currentEmail;

  answers = {
    role: (profile && profile.role) || null,
    goal: (profile && profile.goal) || null,
    experience: (profile && profile.experience) || null
  };
  selectOpt('optsRole', answers.role);
  selectOpt('optsGoal', answers.goal);
  selectOpt('optsExperience', answers.experience);

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'grid';
}

init();
</script>
</body>
</html>
