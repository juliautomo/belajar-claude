<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segera Hadir — Klaud.id</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F8F9FC; color: #0F1628;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px; text-align: center;
  }
  .logo { font-size: 20px; font-weight: 800; color: #0F1628; margin-bottom: 40px; }
  .logo span { color: #4A72D6; }
  .card {
    background: #fff; border: 1px solid #E5E7EB;
    border-radius: 20px; padding: 48px 40px;
    max-width: 480px; width: 100%;
    box-shadow: 0 4px 32px rgba(0,0,0,0.06);
  }
  .badge { display: inline-block; background: #EEF2FF; color: #4A72D6; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 100px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
  h1 { font-size: 26px; font-weight: 800; color: #0F1628; letter-spacing: -0.5px; margin-bottom: 10px; }
  .sub { font-size: 15px; color: #6B7280; line-height: 1.7; margin-bottom: 32px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; text-align: left; }
  input[type="email"] {
    width: 100%; padding: 12px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px;
    font-size: 14px; color: #0F1628; outline: none; transition: border-color 0.2s;
    margin-bottom: 10px; font-family: inherit;
  }
  input[type="email"]:focus { border-color: #4A72D6; }
  .btn {
    width: 100%; padding: 13px; background: #0F1628; color: #fff;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn:hover { background: #4A72D6; }
  .msg { margin-top: 12px; padding: 11px 14px; border-radius: 10px; font-size: 13px; display: none; }
  .msg.success { background: #ECFDF5; color: #065F46; display: block; }
  .msg.error   { background: #FEE2E2; color: #991B1B; display: block; }
  .back { display: inline-block; margin-top: 24px; font-size: 13px; color: #6B7280; text-decoration: none; }
  .back:hover { color: #0F1628; }
</style>
</head>
<body>
  <div class="logo">Klaud<span>.id</span></div>
  <div class="card">
    <div class="badge">Segera Hadir</div>
    <h1 id="courseTitle">Kursus Baru</h1>
    <p class="sub">Kursus ini sedang dalam pengembangan. Daftarkan emailmu untuk mendapat notifikasi saat tersedia — termasuk harga early bird.</p>
    <label for="email">Email kamu</label>
    <input type="email" id="email" placeholder="nama@email.com" />
    <button class="btn" onclick="notify()">Beritahu Saya →</button>
    <div class="msg" id="msg"></div>
    <a href="index.html" class="back">← Kembali ke beranda</a>
  </div>

  <script>
    // Get course name from URL param
    var params = new URLSearchParams(window.location.search);
    var course = params.get('course');
    if (course) document.getElementById('courseTitle').textContent = decodeURIComponent(course);

    async function notify() {
      var email = document.getElementById('email').value.trim();
      var msg   = document.getElementById('msg');
      if (!email || !email.includes('@')) {
        msg.textContent = 'Masukkan email yang valid ya.';
        msg.className = 'msg error'; return;
      }
      try {
        await fetch('https://klaud-backend-production.up.railway.app/signup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: email.split('@')[0], email: email, source: 'coming-soon' })
        });
        msg.textContent = 'Berhasil! Kami akan email kamu saat kursus tersedia.';
        msg.className = 'msg success';
        document.getElementById('email').disabled = true;
      } catch(e) {
        msg.textContent = 'Gagal mendaftar. Silakan coba lagi.';
        msg.className = 'msg error';
      }
    }
    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') notify();
    });
  </script>
</body>
</html>
